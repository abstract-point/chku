services:
  frontend:
    build:
      context: ../../../apps/chku-frontend
      dockerfile: ../../infra/docker/prod/Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  backend:
    build:
      context: ../../../apps/chku-backend
      dockerfile: ../../infra/docker/prod/backend/Dockerfile
    depends_on:
      - db
    env_file:
      - ../../../apps/chku-backend/.env
    expose:
      - "9000"
    restart: unless-stopped

  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_cluster_data:/var/lib/postgresql
    restart: unless-stopped

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_cluster_data:
