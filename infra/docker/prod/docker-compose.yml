services:
  frontend:
    build:
      context: ../../..
      dockerfile: infra/docker/prod/frontend.Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - chku_prod

  backend:
    build:
      context: ../../..
      dockerfile: infra/docker/prod/backend.Dockerfile
    depends_on:
      - db
    env_file:
      - ../../../apps/chku-backend/.env
    volumes:
      - backend_storage_public:/var/www/backend/storage/app/public
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "9000"
    restart: unless-stopped
    networks:
      - chku_prod

  queue:
    build:
      context: ../../..
      dockerfile: infra/docker/prod/backend.Dockerfile
    depends_on:
      - db
    env_file:
      - ../../../apps/chku-backend/.env
    volumes:
      - backend_storage_public:/var/www/backend/storage/app/public
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=60 --rest=0
    restart: unless-stopped
    networks:
      - chku_prod

  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_cluster_data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - chku_prod

  nginx:
    image: nginx:1.31-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - chku_prod

volumes:
  postgres_cluster_data:
  backend_storage_public:

networks:
  chku_prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24
          gateway: 172.30.10.1