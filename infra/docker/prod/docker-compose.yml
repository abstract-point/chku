services:
  frontend:
    build:
      context: ../../../apps/chku-frontend
      dockerfile: ../../infra/docker/prod/Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  backend:
    build:
      context: ../../../apps/chku-backend
      dockerfile: ../../infra/docker/prod/backend/Dockerfile
    depends_on:
      - db
    environment:
      APP_NAME: CHKU
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_LOCALE: ru
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: ru_RU
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-chku}
      DB_USERNAME: ${POSTGRES_USER:-chku}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "9000"
    restart: unless-stopped

  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chku}
      POSTGRES_USER: ${POSTGRES_USER:-chku}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_cluster_data:/var/lib/postgresql
    restart: unless-stopped

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_cluster_data:
