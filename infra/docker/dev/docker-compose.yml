name: chku
services:
  frontend:
    container_name: chku-frontend
    build:
      context: ../../../apps/chku-frontend
      dockerfile: ../../infra/docker/dev/frontend/Dockerfile
    volumes:
      - ../../../apps/chku-frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5180"

  backend:
    container_name: chku-backend
    build:
      context: ../../../apps/chku-backend
      dockerfile: ../../infra/docker/dev/backend/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    depends_on:
      - db
    environment:
      APP_NAME: CHKU
      APP_KEY: REMOVED_APP_KEY 
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8090
      APP_LOCALE: ru
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: ru_RU
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: chku
      DB_USERNAME: chku
      DB_PASSWORD: chku
    volumes:
      - ../../../apps/chku-backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    expose:
      - "9000"

  db:
    container_name: chku-db
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: chku
      POSTGRES_USER: chku
      POSTGRES_PASSWORD: chku
    volumes:
      - postgres_data:/var/lib/postgresql
    expose:
      - "5432"

  nginx:
    container_name: chku-nginx
    image: nginx:1.29-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8090:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  backend_vendor:
  frontend_node_modules:
  postgres_data:
