name: chku
services:
  frontend:
    container_name: chku-frontend
    build:
      context: ../../../apps/chku-frontend
      dockerfile: ../../infra/docker/dev/Dockerfile
    volumes:
      - ../../../apps/chku-frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5180"

  nginx:
    container_name: chku-frontend-nginx
    image: nginx:1.29-alpine
    depends_on:
      - frontend
    ports:
      - "8090:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  frontend_node_modules:
