name: CI / Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env
        run: cp apps/chku-backend/.env.example apps/chku-backend/.env

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install frontend dependencies
        working-directory: apps/chku-frontend
        run: bun install --frozen-lockfile

      - name: Frontend build (type-check + Vite)
        working-directory: apps/chku-frontend
        run: bun run build

      - name: Backend tests
        run: |
          docker compose \
            --env-file apps/chku-backend/.env \
            -f infra/docker/dev/docker-compose.yml \
            run --rm backend php artisan test

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    concurrency:
      group: chku-production
      cancel-in-progress: true

    environment:
      name: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            cd /var/www/chku
            make deploy
